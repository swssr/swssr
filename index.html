  <script type="text/babel" data-presets="env,react">
    const { useState, useEffect, useRef } = React;

    function HoverScene({ project, ink, paper }) {
      const mountRef = useRef(null);

      useEffect(() => {
        if (!project || !mountRef.current || !window.THREE) return;
        const THREE = window.THREE;
        const mount = mountRef.current;
        const w = 360, h = 360;
        const scene = new THREE.Scene();
        const cam = new THREE.PerspectiveCamera(40, 1, 0.1, 100);
        cam.position.z = 4;
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(w, h);
        renderer.setClearColor(0x000000, 0);
        mount.appendChild(renderer.domElement);

        let geom;
        switch (project.shape) {
          case 'box':      geom = new THREE.BoxGeometry(1.5, 1.5, 1.5); break;
          case 'ico':      geom = new THREE.IcosahedronGeometry(1.1, 0); break;
          case 'cylinder': geom = new THREE.CylinderGeometry(0.9, 0.9, 1.6, 32); break;
          case 'octa':     geom = new THREE.OctahedronGeometry(1.2, 0); break;
          case 'knot':     geom = new THREE.TorusKnotGeometry(0.8, 0.26, 80, 12); break;
          default:         geom = new THREE.TorusGeometry(1, 0.32, 16, 64); break;
        }
        const mat = new THREE.MeshBasicMaterial({
          color: new THREE.Color(project.color),
          wireframe: true, transparent: true, opacity: 0.85,
        });
        const mesh = new THREE.Mesh(geom, mat);
        scene.add(mesh);
        const coreMat = new THREE.MeshBasicMaterial({ color: new THREE.Color(ink) });
        const core = new THREE.Mesh(new THREE.SphereGeometry(0.12, 16, 16), coreMat);
        scene.add(core);

        let raf;
        const t0 = performance.now();
        function tick(now) {
          const t = (now - t0) / 1000;
          mesh.rotation.x = t * 0.5;
          mesh.rotation.y = t * 0.7;
          mesh.scale.setScalar(Math.min(1, t * 3));
          renderer.render(scene, cam);
          raf = requestAnimationFrame(tick);
        }
        raf = requestAnimationFrame(tick);

        return () => {
          cancelAnimationFrame(raf);
          renderer.dispose();
          geom.dispose();
          mat.dispose();
          coreMat.dispose();
          if (renderer.domElement.parentNode) renderer.domElement.parentNode.removeChild(renderer.domElement);
        };
      }, [project && project.n, project && project.color, project && project.shape]);

      if (project && project.video) {
        return (
          <video
            key={project.n}
            src={project.video}
            autoPlay muted loop playsInline
            style={{ width: 360, height: 360, objectFit: 'cover', borderRadius: '50%', border: `1px solid ${project.color}` }}
          />
        );
      }
      return <div ref={mountRef} style={{ width: 360, height: 360 }} />;
    }

    function Orbit({ projects, hover, setHover, ink, inkMid, inkSoft, lineBold, paper, centerEyebrow, centerLine1, centerLine2 }) {
      const cx = 720, cy = 470, r = 230;
      return (
        <>
          <svg style={{ position: 'absolute', left: 0, top: 0, width: '100%', height: '100%', pointerEvents: 'none', zIndex: 1 }}>
            <circle cx={cx} cy={cy} r={r} fill="none" stroke={lineBold} strokeWidth="0.75" />
            {Array.from({ length: 12 }).map((_, i) => {
              const a = (i * 30) * Math.PI / 180;
              return (
                <line key={i}
                  x1={cx + Math.cos(a) * (r - 3)} y1={cy + Math.sin(a) * (r - 3)}
                  x2={cx + Math.cos(a) * (r + 3)} y2={cy + Math.sin(a) * (r + 3)}
                  stroke={lineBold} strokeWidth="0.75"
                />
              );
            })}
            {hover !== null && (() => {
              const p = projects[hover]; if (!p) return null;
              const a = p.angle * Math.PI / 180;
              const x = cx + Math.cos(a) * r;
              const y = cy + Math.sin(a) * r;
              return <line x1={cx} y1={cy} x2={x} y2={y} stroke={p.color} strokeWidth="0.75" strokeDasharray="3 3" opacity="0.7" />;
            })()}
            {projects.map((p, i) => {
              const a = p.angle * Math.PI / 180;
              const x = cx + Math.cos(a) * r;
              const y = cy + Math.sin(a) * r;
              const isHover = hover === i;
              return (
                <g key={i}>
                  <circle cx={x} cy={y} r={isHover ? 6 : 3.5} fill={isHover ? p.color : ink} style={{ transition: 'r 0.18s' }} />
                  {isHover && <circle cx={x} cy={y} r="12" fill="none" stroke={p.color} strokeWidth="0.75" opacity="0.5" />}
                </g>
              );
            })}
          </svg>

          <div style={{
            position: 'absolute', left: cx, top: cy,
            transform: 'translate(-50%, -50%)',
            textAlign: 'center', zIndex: 2, width: 360, height: 360,
            pointerEvents: 'none',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
          }}>
            <div style={{
              position: 'absolute', inset: 0,
              display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
              opacity: hover === null ? 1 : 0,
              transition: 'opacity 0.25s ease',
            }}>
              <div style={{ fontFamily: 'var(--mono)', fontSize: 10, letterSpacing: '0.22em', color: inkSoft, marginBottom: 14 }}>
                {centerEyebrow}
              </div>
              <div style={{
                fontFamily: 'var(--display)', fontSize: 34, lineHeight: 1.1,
                color: ink, letterSpacing: '-0.015em', fontWeight: 400,
                textTransform: 'uppercase',
                width: 320,
              }}>
                {centerLine1}<br />
                <span style={{ fontWeight: 600 }}>{centerLine2}</span>
              </div>
            </div>
            <div style={{
              position: 'absolute', inset: 0,
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              opacity: hover === null ? 0 : 1,
              transition: 'opacity 0.25s ease',
            }}>
              {hover !== null && <HoverScene project={projects[hover]} ink={ink} paper={paper} />}
            </div>
            {hover !== null && (
              <div style={{
                position: 'absolute',
                bottom: -30, left: '50%', transform: 'translateX(-50%)',
                fontFamily: 'var(--mono)', fontSize: 10, letterSpacing: '0.22em',
                color: projects[hover].color,
                whiteSpace: 'nowrap',
              }}>
                ◆ NOW VIEWING · {projects[hover].n}
              </div>
            )}
          </div>

          {projects.map((p, i) => {
            const a = p.angle * Math.PI / 180;
            const labelR = r + 40;
            const lx = cx + Math.cos(a) * labelR;
            const ly = cy + Math.sin(a) * labelR;
            const isHover = hover === i;
            const isLeft = Math.cos(a) < -0.3;
            const isRight = Math.cos(a) > 0.3;
            const align = isLeft ? 'right' : isRight ? 'left' : 'center';
            const tx = isLeft ? '-100%' : isRight ? '0' : '-50%';
            return (
              <div key={i}
                onMouseEnter={() => setHover(i)}
                onMouseLeave={() => setHover(null)}
                onClick={() => p.href && window.open(p.href, '_blank', 'noopener')}
                style={{
                  position: 'absolute', left: lx, top: ly,
                  transform: `translate(${tx}, -50%)`,
                  zIndex: 3, cursor: p.href ? 'pointer' : 'default',
                  textAlign: align, padding: '8px 12px', minWidth: 170,
                }}
              >
                <div style={{
                  fontFamily: 'var(--mono)', fontSize: 10, letterSpacing: '0.16em',
                  color: isHover ? p.color : inkSoft, marginBottom: 3,
                  transition: 'color 0.18s',
                }}>
                  {p.n} · {p.tag} <span style={{ color: inkSoft }}>{p.year}</span>
                </div>
                <div style={{
                  fontFamily: 'var(--sans)', fontSize: 18, lineHeight: 1.2,
                  color: ink, fontWeight: isHover ? 500 : 400,
                  letterSpacing: '-0.005em',
                  transition: 'font-weight 0.18s',
                }}>
                  {p.title}
                </div>
              </div>
            );
          })}
        </>
      );
    }

    function Portfolio({ t }) {
      const paper    = '#FFFFFF';
      const ink      = '#0B1733';
      const inkMid   = '#5C6A8A';
      const inkSoft  = '#AEB6C8';
      const line     = 'rgba(11, 23, 51, 0.06)';
      const lineBold = 'rgba(11, 23, 51, 0.14)';
      const splash   = '#FF5722';

      const [hover, setHover] = useState(null);
      const projects = t.projects;
      const footerLinks = (t.footerLinks || '').split(';').map(s => s.trim()).filter(Boolean).map(pair => {
        const [label, href] = pair.split('|');
        return { label: (label || '').trim(), href: (href || '#').trim() };
      });

      return (
        <div style={{
          width: 1440, height: 900,
          background: paper,
          position: 'relative', overflow: 'hidden',
          fontFamily: 'var(--sans)', color: ink,
        }}>
          {/* grid */}
          <div style={{
            position: 'absolute', inset: 0, pointerEvents: 'none',
            backgroundImage: `linear-gradient(to right, ${line} 0.5px, transparent 0.5px), linear-gradient(to bottom, ${line} 0.5px, transparent 0.5px)`,
            backgroundSize: '48px 48px',
          }} />

          {/* top nav */}
          <div style={{
            display: 'flex', justifyContent: 'space-between', alignItems: 'center',
            padding: '22px 40px',
            fontFamily: 'var(--mono)', fontSize: 11, letterSpacing: '0.14em', color: inkMid,
            position: 'relative', zIndex: 2,
          }}>
            <span style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
              <svg width="14" height="14" viewBox="0 0 16 16">
                <circle cx="8" cy="8" r="7" fill="none" stroke={ink} strokeWidth="1.3" />
                <circle cx="8" cy="8" r="2.5" fill={splash} />
              </svg>
              <span style={{ color: ink, fontWeight: 600, letterSpacing: '0.2em' }}>{t.brand}</span>
            </span>
            <span style={{ display: 'flex', gap: 28 }}>
              <a href="#" style={{ color: ink, textDecoration: 'none' }}>{t.navIndex}</a>
              <a href="#" style={{ color: inkMid, textDecoration: 'none' }}>{t.navWork}</a>
              <a href="#" style={{ color: inkMid, textDecoration: 'none' }}>{t.navWriting}</a>
              <a href="#" style={{ color: inkMid, textDecoration: 'none' }}>{t.navContact}</a>
            </span>
            <span style={{ color: inkSoft }}>{t.rev}</span>
          </div>

          {/* left column — about */}
          <div style={{ position: 'absolute', left: 40, top: 140, width: 260, zIndex: 2 }}>
            <div style={{ fontFamily: 'var(--mono)', fontSize: 10, color: inkSoft, letterSpacing: '0.2em', marginBottom: 14 }}>
              {t.aboutLabel}
            </div>
            <div style={{ fontFamily: 'var(--display)', fontSize: 22, lineHeight: 1.25, color: ink, marginBottom: 14, fontWeight: 400, letterSpacing: '-0.01em' }}>
              {t.aboutTitle}
            </div>
            <div style={{ fontFamily: 'var(--sans)', fontSize: 13.5, lineHeight: 1.6, color: inkMid }}>
              {t.aboutBody}
            </div>
          </div>

          {/* right column — availability */}
          <div style={{ position: 'absolute', right: 40, top: 140, width: 260, zIndex: 2, textAlign: 'right' }}>
            <div style={{ fontFamily: 'var(--mono)', fontSize: 10, color: splash, letterSpacing: '0.2em', marginBottom: 14 }}>
              {t.availLabel}
            </div>
            <div style={{ fontFamily: 'var(--sans)', fontSize: 13.5, lineHeight: 1.6, color: inkMid, marginBottom: 18 }}>
              {t.availBody}
            </div>
            <a href={t.ctaHref} style={{
              display: 'inline-block', padding: '10px 16px',
              background: ink, color: paper, textDecoration: 'none',
              fontFamily: 'var(--mono)', fontSize: 11, letterSpacing: '0.18em',
            }}>{t.ctaLabel}</a>
          </div>

          <Orbit
            projects={projects}
            hover={hover} setHover={setHover}
            ink={ink} inkMid={inkMid} inkSoft={inkSoft}
            lineBold={lineBold} paper={paper}
            centerEyebrow={t.centerEyebrow}
            centerLine1={t.centerLine1}
            centerLine2={t.centerLine2}
          />

          {/* footer */}
          <div style={{
            position: 'absolute', bottom: 0, left: 0, right: 0,
            display: 'flex', justifyContent: 'space-between', alignItems: 'center',
            padding: '22px 40px',
            fontFamily: 'var(--mono)', fontSize: 10, letterSpacing: '0.18em', color: inkSoft,
            zIndex: 2,
          }}>
            <span>{t.footerCopyright}</span>
            <span style={{ color: hover !== null ? ink : inkSoft, transition: 'color 0.15s' }}>
              {hover !== null ? `${projects[hover].n} · ${projects[hover].title}` : t.footerIdle}
            </span>
            <span style={{ display: 'flex', gap: 18 }}>
              {footerLinks.map((l, i) => (
                <a key={i} href={l.href} target="_blank" rel="noopener noreferrer" style={{ color: ink, textDecoration: 'none' }}>
                  {l.label} ↗
                </a>
              ))}
            </span>
          </div>
        </div>
      );
    }

    function TweaksPanel({ t, set, onClose }) {
      const text = (key, label, long) => long ? (
        <div className="tw-row">
          <div className="tw-label">{label}</div>
          <textarea className="tw-textarea" value={t[key] || ''} onChange={e => set({ [key]: e.target.value })} />
        </div>
      ) : (
        <div className="tw-row">
          <div className="tw-label">{label}</div>
          <input className="tw-input" value={t[key] || ''} onChange={e => set({ [key]: e.target.value })} />
        </div>
      );

      const updateProject = (i, patch) => {
        const next = t.projects.map((p, idx) => idx === i ? { ...p, ...patch } : p);
        set({ projects: next });
      };
      const addProject = () => {
        const n = String(t.projects.length + 1).padStart(2, '0');
        const step = 360 / (t.projects.length + 1);
        const next = t.projects.map((p, i) => ({ ...p, angle: Math.round(-70 + i * step) }));
        next.push({ n, title: 'New project', tag: 'TAG', year: "'26", angle: Math.round(-70 + t.projects.length * step), color: '#0B1733', video: '', shape: 'torus', href: '' });
        set({ projects: next });
      };
      const delProject = (i) => set({ projects: t.projects.filter((_, idx) => idx !== i) });

      return (
        <div className="tweaks">
          <div className="tweaks-head">
            <span>TWEAKS</span>
            <button onClick={onClose} style={{ background: 'transparent', border: 'none', color: '#E9EEFB', cursor: 'pointer', fontSize: 14 }}>×</button>
          </div>
          <div className="tweaks-body">
            <div className="tw-group">
              <div className="tw-group-title">Header</div>
              {text('brand', 'Brand')}
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr 1fr', gap: 4 }}>
                <input className="tw-input" value={t.navIndex}   onChange={e => set({ navIndex: e.target.value })} />
                <input className="tw-input" value={t.navWork}    onChange={e => set({ navWork: e.target.value })} />
                <input className="tw-input" value={t.navWriting} onChange={e => set({ navWriting: e.target.value })} />
                <input className="tw-input" value={t.navContact} onChange={e => set({ navContact: e.target.value })} />
              </div>
              <div style={{ height: 6 }} />
              {text('rev', 'Revision')}
            </div>

            <div className="tw-group">
              <div className="tw-group-title">About (left)</div>
              {text('aboutLabel', 'Eyebrow')}
              {text('aboutTitle', 'Headline', true)}
              {text('aboutBody', 'Body', true)}
            </div>

            <div className="tw-group">
              <div className="tw-group-title">Availability (right)</div>
              {text('availLabel', 'Status')}
              {text('availBody', 'Body', true)}
              {text('ctaLabel', 'CTA label')}
              {text('ctaHref', 'CTA link')}
            </div>

            <div className="tw-group">
              <div className="tw-group-title">Center statement</div>
              {text('centerEyebrow', 'Eyebrow')}
              {text('centerLine1', 'Line 1')}
              {text('centerLine2', 'Line 2')}
            </div>

            <div className="tw-group">
              <div className="tw-group-title">Projects (orbit)</div>
              {t.projects.map((p, i) => (
                <div key={i} className="tw-project">
                  <div className="tw-project-head">
                    <span style={{ color: '#6D7FB3' }}>#{p.n}</span>
                    <button className="tw-del" onClick={() => delProject(i)}>delete</button>
                  </div>
                  <input className="tw-input" value={p.title} onChange={e => updateProject(i, { title: e.target.value })} style={{ marginBottom: 4 }} placeholder="Title" />
                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 60px 50px', gap: 4, marginBottom: 4 }}>
                    <input className="tw-input" value={p.tag}  onChange={e => updateProject(i, { tag: e.target.value })} placeholder="Tag" />
                    <input className="tw-input" value={p.year} onChange={e => updateProject(i, { year: e.target.value })} placeholder="Year" />
                    <input className="tw-input" type="number" value={p.angle} onChange={e => updateProject(i, { angle: +e.target.value })} placeholder="°" />
                  </div>
                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 30px', gap: 4, marginBottom: 4 }}>
                    <input className="tw-input" value={p.color} onChange={e => updateProject(i, { color: e.target.value })} placeholder="Color" />
                    <input type="color" value={p.color} onChange={e => updateProject(i, { color: e.target.value })} style={{ width: '100%', height: 26, background: 'transparent', border: '1px solid rgba(255,255,255,0.12)', padding: 0, cursor: 'pointer' }} />
                  </div>
                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 90px', gap: 4, marginBottom: 4 }}>
                    <input className="tw-input" value={p.video || ''} onChange={e => updateProject(i, { video: e.target.value })} placeholder="Video URL (mp4)" />
                    <select className="tw-input" value={p.shape || 'torus'} onChange={e => updateProject(i, { shape: e.target.value })} style={{ background: '#0B1733', color: '#E9EEFB' }}>
                      <option value="torus">torus</option>
                      <option value="box">box</option>
                      <option value="ico">ico</option>
                      <option value="cylinder">cyl</option>
                      <option value="octa">octa</option>
                      <option value="knot">knot</option>
                    </select>
                  </div>
                  <input className="tw-input" value={p.href || ''} onChange={e => updateProject(i, { href: e.target.value })} placeholder="Project URL" />
                </div>
              ))}
              <button className="tw-add" onClick={addProject}>+ ADD PROJECT</button>
            </div>

            <div className="tw-group">
              <div className="tw-group-title">Footer</div>
              {text('footerCopyright', 'Copyright')}
              {text('footerIdle', 'Idle text')}
              {text('footerLinks', 'Links (Label|href; …)', true)}
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [t, setT] = useState(window.__TWEAK_DEFAULTS);
      const [editing, setEditing] = useState(false);

      const update = (patch) => setT(prev => ({ ...prev, ...patch }));

      useEffect(() => {
        const onKey = (e) => {
          if (e.shiftKey && e.key === 'T') setEditing(v => !v);
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <>
          <Portfolio t={t} />
          {editing && <TweaksPanel t={t} set={update} onClose={() => setEditing(false)} />}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
